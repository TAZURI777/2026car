        .container { width: 100%; max-width: 1600px; background-color: #ffffff; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); box-sizing: border-box; margin: 10px auto; }

        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 14px; }

        /* 모바일 화면 (카드 뷰) */
        @media screen and (max-width: 900px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; }
            tr.log-row { border: 1px solid #ccc; border-radius: 8px; margin-bottom: 15px; padding: 10px; }
            td { border: none; border-bottom: 1px solid #eee; position: relative; padding-left: 50%; text-align: right; min-height: 44px; display: flex; align-items: center; justify-content: flex-end; }
            td:before { content: attr(data-label); position: absolute; left: 10px; width: 45%; padding-right: 10px; white-space: nowrap; text-align: left; font-weight: bold; color: #333; }
            td:last-child { border-bottom: 0; }
            /* 완료된 행 접기 기능 CSS */
            tr.log-row.completed:not(.expanded) > td:not(:first-child) {
                display: none;
            }
            tr.log-row.completed.is-editing > td { /* 수정 모드에서는 모든 셀을 다시 표시 */
                display: flex;
            }
            /* 접힌 행의 요약 정보 스타일 */
            tr.log-row.completed:not(.expanded) .row-number {
                justify-content: space-between; /* 요약 텍스트와 버튼을 양 끝으로 정렬 */
            }
            tr.log-row.completed:not(.expanded) .row-number span {
                font-size: 14px; /* 폰트 크기 조정 */
                font-weight: normal; /* 폰트 굵기 보통으로 */
                white-space: nowrap; /* 한 줄로 표시 */
                overflow: hidden; /* 넘치는 텍스트 숨김 */
                text-overflow: ellipsis; /* 넘치는 텍스트 ... 처리 */
            }
        }

        /* 데스크탑 화면 (테이블 뷰) */
        @media screen and (min-width: 901px) {
            table { table-layout: fixed; }
            thead { display: table-header-group; }
            tr { display: table-row; border: none; margin: 0; padding: 0; }
            td, th { text-align: center; height: 85px; padding: 8px; border: 1px solid #ddd; vertical-align: middle; }
            td:before { content: ""; display: none; }
        }

        td[contenteditable="true"] { background-color: #e8f4ff; }
        .is-editing .editable-cell[contenteditable="true"] { background-color: #fffbe8; outline: 2px solid #ffc107; }
        .log-row.completed .toggle-btn { display: inline-block; }
        .toggle-btn { font-size: 16px; font-weight: bold; cursor: pointer; padding: 4px 10px; margin-left: 10px; border-radius: 50%; border: 1px solid #ccc; background-color: #fff; line-height: 1; }
        .row-number span { font-weight: bold; font-size: 16px; }
        .action-btn { border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; color: white; margin: 0 2px; }
        .sort-btn {
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 1em;
            padding: 0 5px;
        }
        .edit-row-btn { background-color: #17a2b8; }
        .edit-row-btn.editing { background-color: #ffc107; color: black; }
        .save-row-btn { background-color: #28a745; }
        .delete-row-btn { background-color: #dc3545; }
        .custom-file-upload { background-color: #007bff; transition: background-color 0.3s; padding: 10px 15px; font-size: 14px; border-radius: 8px; color: white;}
        .btn-disabled { background-color: #6c757d; cursor: not-allowed; }
        input[type="file"] { display: none; }
        .thumbnail { max-height: 60px; max-width: 100px; width: auto; border-radius: 4px; cursor: pointer; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.85); }
        .modal-content { margin: auto; display: block; max-width: 90%; max-height: 80%; }
        .modal-bottom { text-align: center; padding-top: 20px; }
        #save-to-gallery-btn { padding: 12px 25px; font-size: 16px; font-weight: bold; background-color: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .close-modal { position: absolute; top: 15px; right: 35px; color: #f1f1f1; font-size: 40px; font-weight: bold; cursor: pointer; }
        .loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); z-index: 2000; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .progress-bar-container { width: 80%; max-width: 300px; height: 20px; background-color: #e0e0e0; border-radius: 10px; overflow: hidden; margin-top: 20px; display: none; }
        .progress-bar { width: 0%; height: 100%; background-color: #007bff; border-radius: 10px; }
        .progress-bar.animated { animation: fill-progress 15s linear forwards; }
        @keyframes fill-progress { from { width: 0%; } to { width: 100%; } }
        .spinner { border: 6px solid #f3f3f3; border-top: 6px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-top: 20px; }

            }

        document.getElementById('crop-btn').addEventListener('click', () => {
            if (cropper) {
                const croppedCanvas = cropper.getCroppedCanvas({
                    maxWidth: 1024,

                });

        function handleTableClick(event) {
            const target = event.target;
            const row = target.closest('.log-row');
            if (!row) return;
            if (target.classList.contains('thumbnail')) {
                modal.style.display = 'block';
                modalImage.src = target.src;
            } else if (target.classList.contains('save-row-btn')) {
                saveTableData();
                target.style.backgroundColor = '#218838';
                target.textContent = '저장됨!';
                setTimeout(() => {
                    target.style.backgroundColor = '';
                    target.textContent = '저장';
                }, 1500);
            } else if (target.classList.contains('edit-row-btn')) {
                toggleRowEditMode(row, target);
            } else if (target.classList.contains('delete-row-btn')) {
                deleteRow(row);
            } else if (target.classList.contains('toggle-btn') && row.classList.contains('completed')) {
                row.classList.toggle('expanded');
                target.textContent = row.classList.contains('expanded') ? '−' : '+';
                updateRowNumbers();

        function handleFileChange(event) {
            const target = event.target;
            if (target.classList.contains('photo-input')) {
                const row = target.closest('.log-row');
                const type = target.dataset.type;
                const photoCell = row.querySelector(`.photo-cell.${type}-photo-cell`);

                // 이미 사진이 있는 경우, 재촬영 여부 확인
                if (photoCell.dataset.imageDataUrl && photoCell.dataset.imageDataUrl !== 'null' && photoCell.dataset.imageDataUrl.startsWith('data:image')) {
                    if (!confirm('이미 사진이 있습니다. 정말 다시 촬영하시겠습니까?')) {
                        target.value = ''; // 파일 선택 취소
                        return; // 사용자가 취소하면 함수 종료
                    }
                }

                const file = target.files[0];
                if (!file) {
                    return;
                }

                currentCropInfo.row = target.closest('.log-row');
                currentCropInfo.type = target.dataset.type;
                currentCropInfo.file = file;

                const reader = new FileReader();
                reader.onload = (e) => {
                    const image = new Image();
                    image.onload = () => {
                        EXIF.getData(file, function() {
                            const orientation = EXIF.getTag(this, 'Orientation');
                            const canvas = document.createElement('canvas');
                            const ctx = canvas.getContext('2d');
                            let { width, height } = image;

                            if (orientation && orientation >= 5 && orientation <= 8) {
                                canvas.width = height;
                                canvas.height = width;
                            } else {
                                canvas.width = width;
                                canvas.height = height;
                            }

                            switch (orientation) {
                                case 2: ctx.transform(-1, 0, 0, 1, width, 0); break;
                                case 3: ctx.transform(-1, 0, 0, -1, width, height); break;
                                case 4: ctx.transform(1, 0, 0, -1, 0, height); break;
                                case 5: ctx.transform(0, 1, 1, 0, 0, 0); break;
                                case 6: ctx.transform(0, 1, -1, 0, height, 0); break;
                                case 7: ctx.transform(0, -1, -1, 0, height, width); break;
                                case 8: ctx.transform(0, -1, 1, 0, 0, width); break;
                                default: break;
                            }

                            ctx.drawImage(image, 0, 0);
                            const dataUrl = canvas.toDataURL();

                            const cropModal = document.getElementById('crop-modal');
                            const imageToCrop = document.getElementById('image-to-crop');

                            imageToCrop.src = dataUrl;
                            cropModal.style.display = 'block';

                            if (cropper) {
                                cropper.destroy();
                            }

                            cropper = new Cropper(imageToCrop, {
                                viewMode: 1,
                                dragMode: 'move',
                                background: false,
                                autoCropArea: 0.8,
                                checkOrientation: false,
                                responsive: true,
                                toggleDragModeOnDblclick: false,
                            });
                        });
                    };
                    image.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        // 주행거리 외 다른 셀들은 입력 즉시 저장되도록 기존 로직 유지
        function handleCellInput(event) {
            const target = event.target;
            if (target.isContentEditable) {
                if (target.classList.contains('mileage')) {
                    let text = target.textContent;
                    const originalLength = text.length;
                    const cursorPosition = window.getSelection().getRangeAt(0).startOffset;

                    const numericValue = text.replace(/\D/g, '');
                    const formattedText = numericValue ? parseInt(numericValue, 10).toLocaleString('ko-KR') : '';

                    if (text !== formattedText) {
                        target.textContent = formattedText;
                        const newLength = formattedText.length;
                        const newCursorPosition = cursorPosition + (newLength - originalLength);
                        try {
                            const newRange = document.createRange();
                            newRange.setStart(target.firstChild || target, Math.max(0, newCursorPosition));
                            newRange.collapse(true);
                            window.getSelection().removeAllRanges();
                            window.getSelection().addRange(newRange);
                        } catch (e) { /* Do nothing if cursor cannot be restored */ }
                    }

                    const currentRow = target.closest('.log-row');
                    const distanceCell = currentRow.querySelector('.distance');
                    const startMileage = parseFloat(currentRow.querySelector('.start-mileage').textContent.replace(/,/g, ''));
                    const endMileage = parseFloat(currentRow.querySelector('.end-mileage').textContent.replace(/,/g, ''));
                    distanceCell.textContent = (!isNaN(startMileage) && !isNaN(endMileage) && endMileage >= startMileage) 
                        ? Math.round(endMileage - startMileage).toLocaleString() : '';
                } else {
                    saveTableData();
                    updateRowNumbers();
                }
            }
        }

        async function processImage(croppedFile, type, row) {
            showLoader(true, true);
            try {
                const exifData = await getExifData(currentCropInfo.file);
                await updateTableFromExif(exifData, type, row);

                const compressedImageDataUrl = await compressImage(croppedFile);
                const photoCell = row.querySelector(`.photo-cell.${type}-photo-cell`);
                photoCell.innerHTML = '';
                const thumbnail = document.createElement('img');
thumbnail.src = compressedImageDataUrl;
                thumbnail.className = 'thumbnail';
                photoCell.appendChild(thumbnail);
                photoCell.dataset.filename = currentCropInfo.file.name;
                photoCell.dataset.imageDataUrl = compressedImageDataUrl;                
                // input을 비활성화하지 않아 재촬영이 가능하도록 수정합니다.

                const ocrPromise = recognizeMileage(croppedFile);
                const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error('OCR 시간 초과 (15초)')), 15000));

                const mileage = await Promise.race([ocrPromise, timeoutPromise]);

                const mileageCell = row.querySelector(`.mileage.${type}-mileage`);
                if (mileage) {
                    const numericValue = mileage.replace(/\D/g, '');
                    const formattedText = numericValue ? parseInt(numericValue, 10).toLocaleString('ko-KR') : '';
                    mileageCell.textContent = formattedText;
                } else {
                    alert('주행거리를 인식하지 못했습니다. 직접 입력해주세요.');
                    mileageCell.textContent = '';
                }
                // OCR 인식 후에는 바로 유효성 검사 실행
                updateDistance(row);
            } catch (error) {
                console.error('이미지 처리 중 오류 발생:', error);
                alert(error.message);
            } finally {
                showLoader(false);
                saveTableData();
            }
        }

        async function updateTableFromExif(exifData, type, row) {
            let dateToUse;
            if (exifData && exifData.dateTime) {
                let formattedString = exifData.dateTime.replace(' ', 'T').replace(/:/g, (m, o) => o < 10 ? '-' : m);
                dateToUse = new Date(formattedString);
            } else {
                dateToUse = new Date();
            }
            if (isNaN(dateToUse.getTime())) { dateToUse = new Date(); }
            const year = dateToUse.getFullYear(), month = dateToUse.getMonth() + 1, day = dateToUse.getDate();
            const displayDate = `${month}/${day}`, fullDate = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const formattedTime = `${String(dateToUse.getHours()).padStart(2, '0')}:${String(dateToUse.getMinutes()).padStart(2, '0')}`;
            
            if (type === 'start') {
                const runDateCell = row.querySelector('.run-date');
                runDateCell.textContent = displayDate;
                runDateCell.dataset.fullDate = fullDate;
                row.querySelector('.start-time').textContent = formattedTime;
            } else {
                row.querySelector('.end-time').textContent = formattedTime;
            }
            if (exifData && exifData.gpsLatitude && exifData.gpsLongitude) {
                const address = await getAddressFromCoordinates(exifData.gpsLatitude, exifData.gpsLongitude);
                row.querySelector(`.${type}-location`).textContent = address;
            } else {
                row.querySelector(`.${type}-location`).textContent = '위치 정보 없음';
            }
        }

        // 주행거리 유효성 검사 로직 추가
        // 주행거리 유효성 검사 및 계산 함수 (호출 시점 변경됨)
        function updateDistance(row) {
            const startMileageCell = row.querySelector('.start-mileage');
            const endMileageCell = row.querySelector('.end-mileage');
            const distanceCell = row.querySelector('.distance');

            const startMileage = parseFloat(startMileageCell.textContent.replace(/,/g, ''));
            const endMileage = parseFloat(endMileageCell.textContent.replace(/,/g, ''));

            // 입력할 때마다 일단 배경색 초기화
            startMileageCell.style.backgroundColor = '';
            endMileageCell.style.backgroundColor = '';

            // 두 값 모두 유효한 숫자인 경우에만 계산 및 검사 진행
            if (!isNaN(startMileage) && !isNaN(endMileage)) {
                // 도착 주행거리가 출발보다 작은 경우
                if (endMileage < startMileage) {
                    // focusout 시점에 팝업 발생
                    alert('도착(km)의 주행거리는 출발(km)보다 크거나 같아야 합니다.');
                    distanceCell.textContent = '';
                    startMileageCell.style.backgroundColor = '#ffdddd';
                    endMileageCell.style.backgroundColor = '#ffdddd';
                    return;
                }

                // 정상적인 경우, 주행거리를 계산하고 완료 여부 확인
                distanceCell.textContent = Math.round(endMileage - startMileage).toLocaleString();
                if (row.dataset.completed === 'false') {
                    const rowNum = row.querySelector('.row-number span').textContent;
                    if (confirm(`No.${rowNum} 운행을 완료하고 저장하시겠습니까?`)) {
                        row.dataset.completed = 'true';
                        row.classList.add('completed');
                        row.querySelector('.toggle-btn').style.display = 'inline-block';
                        if (row === tableBody.lastElementChild) {
                            addNewRow();
                            updateRowNumbers();
                        }
                        saveTableData();
                    }
                }
            } else {
                // 숫자 값이 하나라도 유효하지 않으면 주행거리 칸 비우기
                distanceCell.textContent = '';
            }
        }

        function addNewRow(rowData = {}) {
            const newRow = document.createElement('tr');
            newRow.className = 'log-row';
            if (rowData.completed === 'true') { newRow.classList.add('completed'); }
            if (rowData.expanded === true) { newRow.classList.add('expanded'); }
            newRow.dataset.completed = rowData.completed || 'false';

            const startBtnClass = rowData.startPhotoFile ? 'custom-file-upload btn-disabled' : 'custom-file-upload';
            const endBtnClass = rowData.endPhotoFile ? 'custom-file-upload btn-disabled' : 'custom-file-upload';
            const isStartDisabled = rowData.startPhotoFile ? 'disabled' : '';
            const isEndDisabled = rowData.endPhotoFile ? 'disabled' : '';
            const toggleBtnDisplay = rowData.completed === 'true' ? 'inline-block' : 'none';
            const toggleBtnText = rowData.expanded ? '−' : '+';
            const startThumbHTML = rowData.startImageDataUrl ? `<img src="${rowData.startImageDataUrl}" class="thumbnail">` : '';
            const endThumbHTML = rowData.endImageDataUrl ? `<img src="${rowData.endImageDataUrl}" class="thumbnail">` : '';
            
            const uniqueId = Date.now() + Math.random();
            const startInputId = `start-photo-${uniqueId}`;
            const endInputId = `end-photo-${uniqueId}`;

            newRow.innerHTML = `
                <td class="row-number" data-label="No."><span></span><button class="toggle-btn" style="display: ${toggleBtnDisplay};">${toggleBtnText}</button></td>
                <td data-label="출발촬영"><label for="${startInputId}" class="${startBtnClass}">📸 출발</label><input id="${startInputId}" class="photo-input" data-type="start" type="file" accept="image/*" capture="environment" ${isStartDisabled}></td>
                <td data-label="도착촬영"><label for="${endInputId}" class="${endBtnClass}">📸 도착</label><input id="${endInputId}" class="photo-input" data-type="end" type="file" accept="image/*" capture="environment" ${isEndDisabled}></td>
                <td class="run-date editable-cell" contenteditable="true" data-label="운행 일자" data-full-date="${rowData.fullDate || ''}">${rowData.displayDate || ''}</td>
                <td class="start-location editable-cell" contenteditable="true" data-label="출발지">${rowData.startLocation || ''}</td>
                <td class="end-location editable-cell" contenteditable="true" data-label="도착지">${rowData.endLocation || ''}</td>
                <td class="start-time editable-cell" contenteditable="true" data-label="출발시간(H)">${rowData.startTime || ''}</td>
                <td class="end-time editable-cell" contenteditable="true" data-label="도착시간(H)">${rowData.endTime || ''}</td>
                <td class="mileage start-mileage" contenteditable="true" data-label="출발(km)">${rowData.startMileage || ''}</td>
                <td class="mileage end-mileage" contenteditable="true" data-label="도착(km)">${rowData.endMileage || ''}</td>
                <td class="distance" data-label="주행거리(km)">${rowData.distance || ''}</td>
                <td contenteditable="true" data-label="비고">${rowData.remarks || ''}</td>
                <td class="photo-cell start-photo-cell" data-label="출발사진" data-filename="${rowData.startPhotoFile || ''}" data-image-data-url="${rowData.startImageDataUrl || ''}">${startThumbHTML}</td>
                <td class="photo-cell end-photo-cell" data-label="도착사진" data-filename="${rowData.endPhotoFile || ''}" data-image-data-url="${rowData.endImageDataUrl || ''}">${endThumbHTML}</td>
                <td data-label="관리"><button class="action-btn save-row-btn">저장</button><button class="action-btn edit-row-btn">수정</button><button class="action-btn delete-row-btn">삭제</button></td>
            `;
            tableBody.appendChild(newRow);
        }

        function deleteRow(row) {
            if (confirm('이 행을 정말로 삭제하시겠습니까?')) {
                const isLastRow = tableBody.children.length <= 1;
                row.remove();
                if (isLastRow) { addNewRow(); }
                updateRowNumbers();
                saveTableData();
            }
        }

        function updateRowNumbers() {
            const rows = tableBody.querySelectorAll('.log-row');
            rows.forEach((row, index) => {
                const rowNumSpan = row.querySelector('.row-number span');
                const rowNum = index + 1;

                // 모바일 뷰에서 접혔을 때만 요약 정보 표시
                if (window.innerWidth <= 900 && row.classList.contains('completed') && !row.classList.contains('expanded')) {
                    const startLocation = row.querySelector('.start-location').textContent || '출발지';
                    const endLocation = row.querySelector('.end-location').textContent || '도착지';
                    const displayDate = row.querySelector('.run-date').textContent || '날짜';
                    rowNumSpan.textContent = `No.${rowNum} ${startLocation}-${endLocation} ${displayDate}`;
                } else {
                    rowNumSpan.textContent = rowNum;
                }
            });
        }

        function toggleRowEditMode(row, button) {
            const isEditing = !row.classList.contains('is-editing');
            row.classList.toggle('is-editing', isEditing);
            button.textContent = isEditing ? '완료' : '수정';
            button.classList.toggle('editing', isEditing);
            const cellsToEdit = row.querySelectorAll('.editable-cell');
            cellsToEdit.forEach(cell => {
                cell.contentEditable = isEditing;
            });
            if (!isEditing) {
                const runDateCell = row.querySelector('.run-date');
                const dateParts = runDateCell.textContent.split('/');
                if (dateParts.length === 2) {
                    const yearGuess = new Date().getFullYear();
                    const month = String(dateParts[0]).padStart(2, '0');
                    const day = String(dateParts[1]).padStart(2, '0');
                    runDateCell.dataset.fullDate = `${yearGuess}-${month}-${day}`;
                }
                saveTableData();
                updateRowNumbers();
            }
        }

        function sortTableByDate() {
            const tableBody = document.getElementById('log-body');
            const rows = Array.from(tableBody.querySelectorAll('.log-row'));
            const sortBtn = document.getElementById('sort-by-date-btn');
            const currentOrder = sortBtn.dataset.order || 'desc'; // 기본 내림차순

            rows.sort((a, b) => {
                const dateA = a.querySelector('.run-date').dataset.fullDate || '0';
                const dateB = b.querySelector('.run-date').dataset.fullDate || '0';
                
                if (currentOrder === 'desc') {
                    return dateB.localeCompare(dateA);
                } else {
                    return dateA.localeCompare(dateB);
                }
            });

            sortBtn.dataset.order = (currentOrder === 'desc') ? 'asc' : 'desc';
            sortBtn.textContent = (currentOrder === 'desc') ? '↓' : '↑';
            rows.forEach(row => tableBody.appendChild(row));
            updateRowNumbers();
            saveTableData();
        }

        function saveTableData() {
            try {
                const rows = document.querySelectorAll('#log-body .log-row');
                const dataToSave = Array.from(rows).map(row => {
                    const runDateCell = row.querySelector('.run-date');
                    const startPhotoCell = row.querySelector('.start-photo-cell');
                    const endPhotoCell = row.querySelector('.end-photo-cell');
                    return {
                        completed: row.dataset.completed,
                        expanded: row.classList.contains('expanded'),
                        displayDate: runDateCell.textContent,
                        fullDate: runDateCell.dataset.fullDate,
                        startLocation: row.querySelector('.start-location').textContent,
                        endLocation: row.querySelector('.end-location').textContent,
                        startTime: row.querySelector('.start-time').textContent,
                        endTime: row.querySelector('.end-time').textContent,
                        startMileage: row.querySelector('.start-mileage').textContent,
                        endMileage: row.querySelector('.end-mileage').textContent,
                        distance: row.querySelector('.distance').textContent,
                        remarks: row.querySelector('[data-label="비고"]').textContent,
                        startPhotoFile: startPhotoCell.dataset.filename,
                        endPhotoFile: endPhotoCell.dataset.filename,
                        startImageDataUrl: startPhotoCell.dataset.imageDataUrl,
                        endImageDataUrl: endPhotoCell.dataset.imageDataUrl
                    };
                });
                localStorage.setItem('drivingLogData', JSON.stringify(dataToSave));
            } catch (e) {
                console.error("데이터 저장 중 오류 발생:", e);
                alert("데이터 저장에 실패했습니다. 브라우저 저장 공간이 부족할 수 있습니다.");
            }
        }

        function loadTableData() {
            const savedData = localStorage.getItem('drivingLogData');
            if (savedData) {
                try {
                    const dataArray = JSON.parse(savedData);
                    if (dataArray && dataArray.length > 0) {
                        tableBody.innerHTML = '';
                        dataArray.forEach(rowData => { addNewRow(rowData); });
                        updateRowNumbers();
                        return;
                    }
                } catch (e) {
                    console.error("저장된 데이터 파싱 오류:", e);
                    localStorage.removeItem('drivingLogData');
                }
            }
            addNewRow();
        }

        async function downloadExcel() {
            showLoader(true);
            try {
                const zip = new JSZip();
                const imgFolder = zip.folder("images");
                const data = [];
                const headers = ["No.", "운행 일자", "출발지", "도착지", "출발시간(H)", "도착시간(H)", "출발(km)", "도착(km)", "주행거리(km)", "비고", "출발사진", "도착사진"];
                
                const rows = document.querySelectorAll('#log-body .log-row');

                for (const [index, row] of rows.entries()) {
                    const rowNum = index + 1;
                    const runDateCell = row.querySelector('.run-date');
                    const startPhotoCell = row.querySelector('.start-photo-cell');
                    const endPhotoCell = row.querySelector('.end-photo-cell');
                    
                    // 파일명으로 사용할 정보 추출 및 정제
                    const sanitize = (str) => (str || '').replace(/[\s\\/:"*?<>|]+/g, '_').replace(/__/g, '_');
                    const date = runDateCell.dataset.fullDate || '날짜없음';
                    const startLoc = row.querySelector('.start-location').textContent || '출발지없음';
                    const endLoc = row.querySelector('.end-location').textContent || '도착지없음';
                    const baseFilename = `${date}_${sanitize(startLoc)}-${sanitize(endLoc)}`;
                    
                    let startImageName = '';
                    if (startPhotoCell.dataset.imageDataUrl && startPhotoCell.dataset.imageDataUrl !== 'null' && startPhotoCell.dataset.imageDataUrl.startsWith('data:image')) {
                        const filename = `${baseFilename}_start.jpg`;
                        startImageName = `images/${filename}`;
                        const base64Data = startPhotoCell.dataset.imageDataUrl.split(',')[1];
                        imgFolder.file(filename, base64Data, { base64: true });
                    }

                    let endImageName = '';
                    if (endPhotoCell.dataset.imageDataUrl && endPhotoCell.dataset.imageDataUrl !== 'null' && endPhotoCell.dataset.imageDataUrl.startsWith('data:image')) {
                        const filename = `${baseFilename}_end.jpg`;
                        endImageName = `images/${filename}`;
                        const base64Data = endPhotoCell.dataset.imageDataUrl.split(',')[1];
                        imgFolder.file(filename, base64Data, { base64: true });
                    }

                    data.push({
                        "No.": rowNum, "운행 일자": runDateCell.dataset.fullDate || runDateCell.textContent, "출발지": row.querySelector('.start-location').textContent, "도착지": row.querySelector('.end-location').textContent, "출발시간(H)": row.querySelector('.start-time').textContent, "도착시간(H)": row.querySelector('.end-time').textContent, "출발(km)": row.querySelector('.start-mileage').textContent, "도착(km)": row.querySelector('.end-mileage').textContent, "주행거리(km)": row.querySelector('.distance').textContent, "비고": row.querySelector('[data-label="비고"]').textContent, "출발사진": startImageName, "도착사진": endImageName
                    });
                }

                const ws = XLSX.utils.json_to_sheet(data, { header: headers });
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "운행일지");
                const excelBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                zip.file("운행일지.xlsx", new Blob([excelBuffer], { type: "application/octet-stream" }));

                const content = await zip.generateAsync({ type: "blob" });
                
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = `운행일지_${new Date().toISOString().slice(0,10)}.zip`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (error) {
                console.error("ZIP 파일 생성 중 오류 발생:", error);
                alert("파일 다운로드 중 오류가 발생했습니다.");
            } finally {
                showLoader(false);
            }
        }

        function getExifData(file) {
            return new Promise((resolve) => {
                let resolved = false;
                const timeoutId = setTimeout(() => { if (!resolved) { console.warn("EXIF 읽기 시간 초과"); resolved = true; resolve(null); } }, 2000);
                try {
                    EXIF.getData(file, function() {
                        if (resolved) return;
                        clearTimeout(timeoutId);
                        const dt = EXIF.getTag(this, "DateTimeOriginal"), gLatR = EXIF.getTag(this, "GPSLatitudeRef"), gLat = EXIF.getTag(this, "GPSLatitude"), gLonR = EXIF.getTag(this, "GPSLongitudeRef"), gLon = EXIF.getTag(this, "GPSLongitude");
                        let lat = null, lon = null;
                        if (gLat && gLon) { lat = convertDMSToDD(gLat, gLatR); lon = convertDMSToDD(gLon, gLonR); }
                        resolved = true;
                        resolve({ dateTime: dt || null, gpsLatitude: lat, gpsLongitude: lon });
                    });
                } catch (error) { if (resolved) return; clearTimeout(timeoutId); console.error("EXIF 처리 에러:", error); resolve(null); }
            });
        }

        function compressImage(file, maxWidth = 1024, quality = 0.8) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let { width, height } = img;
                        if (width > maxWidth) {
                            height = (maxWidth / width) * height;
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        const dataUrl = canvas.toDataURL('image/jpeg', quality);
                        resolve(dataUrl);
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function recognizeMileage(imageSource) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            const image = await new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = reject;
                img.src = (typeof imageSource !== 'string') ? URL.createObjectURL(imageSource) : imageSource;
            });
            canvas.width = image.width;
            canvas.height = image.height;
            ctx.drawImage(image, 0, 0); // 캔버스에 이미지 그리기
            if (typeof imageSource !== 'string') URL.revokeObjectURL(image.src);

            // 이미지 전처리: 그레이스케일 및 이진화 (인식률 개선)
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            let darkPixels = 0;
            const totalPixels = data.length / 4;

            for (let i = 0; i < data.length; i += 4) {
                // 표준 휘도 공식(Luminosity method)을 사용하여 그레이스케일로 변환
                const grayscale = data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
                // 임계값을 기준으로 흑백 이진화
                const threshold = 128;
                const color = grayscale > threshold ? 255 : 0;
                data[i] = data[i+1] = data[i+2] = color;
                if (color === 0) darkPixels++;
            }

            // Tesseract는 흰 배경에 검은 글씨를 선호합니다.
            // 만약 이미지의 50% 이상이 검은색이라면, 글씨가 흰색일 가능성이 높으므로 색상을 반전시킵니다.
            if (darkPixels > totalPixels / 2) {
                console.log("어두운 배경으로 판단되어 색상을 반전합니다.");
                for (let i = 0; i < data.length; i += 4) {
                    data[i] = 255 - data[i];
                    data[i+1] = 255 - data[i+1];
                    data[i+2] = 255 - data[i+2];
                }
            }
            ctx.putImageData(imageData, 0, 0);

            const worker = await Tesseract.createWorker('eng');
            await worker.setParameters({
                tessedit_char_whitelist: '0123456789', // 숫자만 인식하도록 제한
                // OSD(Orientation and Script Detection) 포함 모드로 변경하여 기울어진 이미지 인식률 향상
                tessedit_pageseg_mode: Tesseract.PSM.SPARSE_TEXT_OSD,
            });

            const parseText = (text) => {
                console.log("OCR 원본:", text);
                const numbers = text.match(/\d+/g); // 텍스트에서 모든 숫자 그룹을 찾습니다.
                if (!numbers || numbers.length === 0) {
                    console.log("유효한 숫자를 찾지 못했습니다.");
                    return null;
                }
                // 찾은 숫자 그룹 중 가장 긴 것을 주행거리로 간주합니다.
                numbers.sort((a, b) => b.length - a.length);
                console.log("추출된 숫자:", numbers[0]);
                return numbers[0];
            };

            try {
                console.log("OCR 인식 시도 (OSD 모드)");
                let result = await worker.recognize(canvas);
                let mileage = parseText(result.data.text);
                // OSD가 방향을 자동 감지하므로 수동 90도 회전 로직 제거
                return mileage;
            } catch (error) { 
                console.error("OCR 처리 중 오류:", error); 
                return null; 
            } finally { 
                await worker.terminate(); 
            }
        }

        function convertDMSToDD(dms, ref) {
            if (!dms || dms.length < 3) return 0;
            const dd = dms[0] + dms[1] / 60 + dms[2] / 3600;
            return (ref === "S" || ref === "W") ? -dd : dd;
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180, Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // Google API를 사용하던 함수를 Kakao API를 사용하도록 전체 변경
        async function getAddressFromCoordinates(lat, lon) {
            const searchRadius = 500; // 500미터 반경

            // 1. 가장 가까운 서비스 센터 확인 (기존 로직 유지)
            for (const center of serviceCenters) {
                const distance = calculateDistance(lat, lon, center.lat, center.lon);
                if (distance <= searchRadius) {
                    return center.name; // 반경 내에 있으면 센터 이름 반환
                }
            }
            
            // 2. 반경 내 센터가 없으면 선택된 API로 주소 조회
            if (currentApiType === 'kakao') {
                const KAKAO_API_KEY = getApiKey();
                if (!KAKAO_API_KEY) return "Kakao API 키를 입력하세요.";

                const url = `https://dapi.kakao.com/v2/local/geo/coord2address.json?x=${lon}&y=${lat}`;
                
                try {
                    const response = await fetch(url, {
                        headers: { 'Authorization': `KakaoAK ${KAKAO_API_KEY}` }
                    });

                    if (!response.ok) {
                        const errorBody = await response.text();
                        console.error(`Kakao API error: ${response.status} ${response.statusText}`, errorBody);
                        if (response.status === 401 || response.status === 400) {
                            return "주소 조회 실패 (API 키를 확인하세요)";
                        }
                        return `주소 조회 실패 (오류: ${response.status})`;
                    }

                    const data = await response.json();

                    if (data.documents && data.documents.length > 0) {
                        const result = data.documents[0];
                        // 도로명 주소가 있으면 도로명 주소를, 없으면 지번 주소를 사용
                        const address = result.road_address ? result.road_address.address_name : result.address.address_name;
                        return address || "주소 정보 없음";
                    }
                    return "주소 정보 없음";
                } catch (error) { console.error("Kakao 주소 조회 실패:", error); return "주소 조회 실패"; }
            } else if (currentApiType === 'google') {
                const GOOGLE_API_KEY = getApiKey();
                if (!GOOGLE_API_KEY) return "Google API 키를 입력하세요.";

                const url = `https://maps.googleapis.com/maps/api/geocode/json?latlng=${lat},${lon}&key=${GOOGLE_API_KEY}&language=ko`;
                try {
                    const response = await fetch(url);
                    const data = await response.json();
                    if (data.status === 'OK' && data.results.length > 0) {
                        const formattedAddress = data.results[0].formatted_address;
                        const addressWithoutCountry = formattedAddress.replace(/^대한민국 /, ''); // '대한민국' 제외
                        return addressWithoutCountry;
                    }
                    return "주소 정보 없음";
                } catch (error) { console.error("Google 주소 조회 실패:", error); return "주소 조회 실패"; }
            }
            return "API 선택 오류"; // Fallback if currentApiType is not set or invalid
        }

        function getApiKey() {
            let apiKey;
            let keyName;
            let promptMessage;

            if (currentApiType === 'kakao') {
                keyName = 'kakaoApiKey';
                promptMessage = '카카오(Kakao) REST API 키를 입력하세요.\n이 키는 브라우저에 저장되며, 주소 변환 기능에 사용됩니다.';
            } else if (currentApiType === 'google') {
                keyName = 'googleApiKey';
                promptMessage = 'Google Geocoding API 키를 입력하세요.\n이 키는 브라우저에 저장되며, 주소 변환 기능에 사용됩니다.';
            } else { return null; } // Should not happen if currentApiType is properly set

            apiKey = localStorage.getItem(keyName);
            if (!apiKey || apiKey === 'null' || apiKey.trim() === '') {
                apiKey = prompt(promptMessage);
                if (apiKey) { localStorage.setItem(keyName, apiKey); }
            }
            return apiKey;
        }

        function showLoader(show, showProgress = false) {
            const loader = document.getElementById('loader');
            const progressBarContainer = loader.querySelector('.progress-bar-container');
            const progressBar = loader.querySelector('.progress-bar');
            const loaderText = loader.querySelector('#loader-text');
            if (show) {
                loader.style.display = 'flex';
                if (showProgress) {
                    loaderText.textContent = '계기판 주행거리를 확인합니다... (15초)';
                    progressBarContainer.style.display = 'block';
                    progressBar.classList.remove('animated');
                    void progressBar.offsetWidth;
                    progressBar.classList.add('animated');
                } else {
                    loaderText.textContent = '처리 중입니다...';
                    progressBarContainer.style.display = 'none';
                }
            } else {
                loader.style.display = 'none';
            }
        }

        function checkForUpdates() {
            const versionSpan = document.querySelector('h1 span');
            if (!versionSpan) return;

            const currentVersion = versionSpan.textContent.replace('ver_', '');

            // 캐시를 우회하기 위해 타임스탬프를 쿼리 파라미터로 추가합니다.
            fetch(`version.json?v=${new Date().getTime()}`)
                .then(response => {
                    if (!response.ok) {
                        // version.json 파일이 없는 경우 조용히 실패 처리
                        if (response.status === 404) return null;
                        throw new Error('version.json 파일을 가져오는 중 오류 발생');
                    }
                    return response.json();
                })
                .then(data => {
                    if (!data) return; // 파일이 없으면 중단
                    const latestVersion = data.version;
                    console.log(`현재 버전: ${currentVersion}, 최신 버전: ${latestVersion}`);
                    if (latestVersion > currentVersion) {
                        if (confirm(`새로운 버전(${latestVersion})이 있습니다. 지금 업데이트하시겠습니까?`)) {
                            location.reload(true); // 캐시를 무시하고 서버에서 새로고침
                        }
                    }
                })
                .catch(error => console.error('업데이트 확인 중 오류 발생:', error));
        }

        loadTableData();
        updateRowNumbers();

        // 페이지 로드 후 잠시 뒤에 업데이트 확인 시작
        setTimeout(() => {
            checkForUpdates();
            // 그 후 30분마다 주기적으로 업데이트 확인
            setInterval(checkForUpdates, 1000 * 60 * 30);
        }, 3000);
    });
    </script>
